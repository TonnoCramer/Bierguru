{% load static %}
<!doctype html>
<html lang="nl">

      background: #ffe8d6;

    <p>De tap staat even dicht.<br>

  <footer style="position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 0.85rem;">
    <a href="/privacy/" style="color: #CC5500; text-decoration: none;">
